<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- soft blobs -->
  <g filter="url(#blur)">
    <circle cx="280" cy="220" r="170" fill="url(#g)" opacity="0.35"/>
    <circle cx="1320" cy="240" r="220" fill="url(#g)" opacity="0.25"/>
    <circle cx="1200" cy="700" r="260" fill="url(#g)" opacity="0.18"/>
  </g>

  <!-- subtle grid -->
  <g opacity="0.22" stroke="#fff" stroke-opacity="0.22">
    <path d="M80 140H1520" />
    <path d="M80 320H1520" />
    <path d="M80 500H1520" />
    <path d="M80 680H1520" />
    <path d="M220 60V840" />
    <path d="M520 60V840" />
    <path d="M820 60V840" />
    <path d="M1120 60V840" />
    <path d="M1420 60V840" />
  </g>

  <!-- icon set: shield/check, document, lock -->
  <g opacity="0.34" stroke="#fff" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- shield -->
    <path d="M1280 150l90 40v120c0 90-60 160-90 175-30-15-90-85-90-175V190l90-40z"/>
    <path d="M1248 285l28 32 72-78"/>

    <!-- document -->
    <path d="M260 520h200v250H260z"/>
    <path d="M300 580h120"/>
    <path d="M300 635h150"/>
    <path d="M300 690h110"/>

    <!-- lock -->
    <path d="M1180 610h210v180h-210z"/>
    <path d="M1225 610v-55c0-55 35-90 80-90s80 35 80 90v55"/>
    <path d="M1285 700v55"/>
  </g>

  <!-- small "verification" stamps -->
  <g opacity="0.28" fill="#fff" fill-opacity="0.6">
    <circle cx="540" cy="210" r="10"/>
    <circle cx="590" cy="250" r="8"/>
    <circle cx="640" cy="205" r="7"/>
    <circle cx="690" cy="245" r="9"/>
    <circle cx="740" cy="215" r="7"/>
  </g>
</svg>

